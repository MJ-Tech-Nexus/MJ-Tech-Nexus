name: Profile Update

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC — keeps cached stat cards fresh
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Touch a timestamp so GitHub's image cache for stats cards is busted daily
      - name: Update refresh marker
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .last-refresh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-refresh
          git diff --cached --quiet || git commit -m "chore: daily profile refresh"
          git push
